<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="description" content="UNI&CORE product detail — authentic HQ K-beauty / healthcare products with Shopee pricing." />
<title>Product Detail — UNI&CORE</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='3' y='4' width='4' height='16' fill='%23A7A8A8'/%3E%3Crect x='10' y='4' width='4' height='16' fill='%235C9A46'/%3E%3Crect x='17' y='4' width='4' height='16' fill='%233A3A3A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="products">
<a class="skip" href="#main">Skip to content</a>
<div id="site-header"></div>

<main id="main">
<section class="section"><div class="wrap">
  <div id="pdRoot"></div>
</div></section>

<section class="section alt"><div class="wrap">
  <div class="shead reveal"><div class="k">You may also like</div><h2>Related products</h2></div>
  <div class="pgrid" id="related"></div>
</div></section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
const id = new URLSearchParams(location.search).get('id') || 1;
const p = UNICORE.get(id);
const root = document.getElementById('pdRoot');
if(!p){ root.innerHTML='<p style="text-align:center;padding:60px;color:#8C8F8C;font-weight:700">Product not found. <a href="products.html" style="color:#467A35">View all products</a></p>'; }
else {
  const t = UNICORE.tiers(p.id);
  const priceBlock = t ? `
    <div class="pd-price">
      <div class="pp-head"><span class="pp-retail">${UNICORE.peso(t.retail)}</span><span class="pp-rl">Retail price</span></div>
      <div class="pp-tier"><div class="pp-l"><div class="pp-t">UNI&CORE Membership</div><div class="pp-v"><b>${UNICORE.peso(t.member)}</b><s>${UNICORE.peso(t.retail)}</s></div></div><span class="pp-b">%</span></div>
      <div class="pp-tier on"><div class="pp-l"><div class="pp-t">UNI&CORE Subscription</div><div class="pp-v"><b>${UNICORE.peso(t.sub)}</b><s>${UNICORE.peso(t.retail)}</s></div></div><span class="pp-b on">%</span></div>
    </div>
    <div class="pd-ship"><span>🚚 Free shipping on orders over ₱14,520</span><span>Authentic · ships from Korea${p.live?' · Live on Shopee':''}</span></div>`
    : `<div class="priceline"><span class="big">${UNICORE.peso(p.php)}</span><span class="ref">${p.live?'Shopee price':'Member price'}</span></div>`;

  const qtyUI = `<div class="pd-qty"><button type="button" onclick="pdQty(-1)" aria-label="Decrease quantity">&minus;</button><input id="pdQtyIn" type="number" value="1" min="1" max="99" inputmode="numeric" aria-label="Quantity"><button type="button" onclick="pdQty(1)" aria-label="Increase quantity">+</button></div>`;
  const buy = p.live
    ? `${qtyUI}<button class="btn btn-green" onclick="pdAdd(${p.id})">Add to cart →</button>
       <a class="btn btn-dark" href="${UNICORE.SHOPEE}" target="_blank" rel="noopener">Buy on Shopee</a>`
    : `${qtyUI}<button class="btn btn-green" onclick="pdAdd(${p.id})">Add to cart →</button>
       <a class="btn btn-outline" href="ai-analysis.html">Get a recommendation</a>`;
  document.title = p.name + ' — UNI&CORE';
  const d = UNICORE.detail(p.id) || {};

  // trust line + key-spec chips
  const trustLine = `
    <div class="pd-trust-line">
      <span><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Authentic HQ product</span>
      <span><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Ships from Korea</span>
      <span><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Quality controlled</span>
    </div>`;
  const chipVals = d.info ? Object.entries(d.info).filter(([k,v])=>String(v).length<=24).slice(0,3).map(([k,v])=>`<span class="chip">${v}</span>`).join('') : '';
  const chips = chipVals ? `<div class="pd-chips">${chipVals}</div>` : '';

  const benefits = d.ben ? `
    <div class="pd-sec">
      <h2 class="pd-h">Why you'll love it</h2>
      <div class="pd-benefits">${d.ben.map(b=>`
        <div class="pdb"><div class="pdb-i"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div><h4>${b[0]}</h4><p>${b[1]}</p></div>`).join('')}</div>
    </div>` : '';

  // how-to: render as numbered steps when there are 2+ sentences, else elegant block
  const how = d.how ? (()=>{
    const steps = d.how.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(s=>s.length>4);
    if(steps.length>=2){
      return `
    <div class="pd-sec">
      <h2 class="pd-h">How to use</h2>
      <div class="pd-steps">${steps.slice(0,4).map((s,i)=>`<div class="pd-step"><div class="sn">${String(i+1).padStart(2,'0')}</div><p>${s}</p></div>`).join('')}</div>
    </div>`;
    }
    return `
    <div class="pd-how">
      <h2 class="pd-h">How to use</h2>
      <p>${d.how}</p>
    </div>`;
  })() : '';

  const infoRows = d.info ? Object.entries(d.info).map(([k,v])=>`<tr><th>${k}</th><td>${v}</td></tr>`).join('') : '';
  const infoTable = `
    <div class="pd-sec">
      <h2 class="pd-h">Product information</h2>
      <table class="pd-info"><tbody>${infoRows}<tr><th>Price</th><td>${UNICORE.peso(p.php)} <span style="color:var(--muted);font-weight:700">(${p.live?'Shopee retail':'Member price'})</span></td></tr></tbody></table>
    </div>`;

  const CONCEPT = {
    Skincare:'https://d8j0ntlcm91z4.cloudfront.net/user_3DTyZSlqPjD203YBlwJWTda3q73/hf_20260619_013837_56591e0c-7a86-474a-aae2-4538df9e95ae.png',
    Healthcare:'https://d8j0ntlcm91z4.cloudfront.net/user_3DTyZSlqPjD203YBlwJWTda3q73/hf_20260619_013950_a4e0f2e7-040c-415f-bf80-d930c468512e.png'
  };
  const conceptImg = CONCEPT[p.cat] || CONCEPT.Skincare;
  const isSkin = p.cat==='Skincare';
  const conceptBand = `
    <div class="pd-concept reveal" style="background-image:linear-gradient(90deg,rgba(12,16,10,.62),rgba(12,16,10,.18)),url('${conceptImg}')">
      <div class="pd-concept-in">
        <div class="k">The UNI&CORE Experience</div>
        <h2>${isSkin?'Glass-skin glow,<br>every single day':'Wellness, made<br>effortless'}</h2>
        <p>${isSkin?'Clean K-beauty formulated for radiant, healthy-looking skin — a ritual you’ll love coming back to.':'Daily inner-care that helps you feel your best, inside and out — simple, consistent, effective.'}</p>
      </div>
    </div>`;

  // guarantee strip
  const guarantee = `
    <div class="pd-guarantee reveal">
      <div class="pd-g"><div class="gi"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-11V5l-8-3-8 3v6c0 7 8 11 8 11z"/></svg></div><div><h4>HQ-Direct Authentic</h4><p>Sourced straight from UNI&CORE headquarters.</p></div></div>
      <div class="pd-g"><div class="gi"><svg viewBox="0 0 24 24"><path d="M3 7h13v10H3zM16 10h4l1 3v4h-5"/><circle cx="7" cy="19" r="1.5"/><circle cx="18" cy="19" r="1.5"/></svg></div><div><h4>Ships from Korea</h4><p>Tracked international delivery to your door.</p></div></div>
      <div class="pd-g"><div class="gi"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-6.2-8.6"/><path d="M21 4v5h-5"/></svg></div><div><h4>Subscription saves more</h4><p>Extra discount, points & free shipping.</p></div></div>
      <div class="pd-g"><div class="gi"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div><div><h4>Secure checkout</h4><p>Safe payment via the official Shopee store.</p></div></div>
    </div>`;

  // subscribe & save band
  const subsave = `
    <div class="pd-subsave reveal">
      <div>
        <div class="k">Subscribe & Save</div>
        <h3>Never run out — and pay less</h3>
        <p>Set a 1, 3, 6 or 12-month auto-delivery cycle for an extra member discount, bonus points and free shipping on every order.</p>
      </div>
      <a class="btn btn-green" href="subscription.html">See subscription benefits →</a>
    </div>`;

  root.innerHTML = `
    <div class="crumb" style="font-size:12.5px;font-weight:700;color:#8C8F8C;margin-bottom:20px"><a href="index.html" style="color:#8C8F8C">HOME</a> › <a href="products.html" style="color:#8C8F8C">SHOP</a> › ${p.cat}</div>
    <div class="pd">
      <div class="pimg reveal"><img src="${UNICORE.PIMG}${p.img}" alt="${p.name}" onerror="this.style.display='none'"></div>
      <div class="pinfo reveal">
        <span class="pill">${p.live?'BEST · On Shopee':'New'}</span>
        <div class="cat">${p.cat}</div>
        <h1>${p.name}</h1>
        ${trustLine}
        <div class="desc">${d.long||p.desc}</div>
        ${chips}
        ${priceBlock}
        <div class="pbtns pd-buyrow">${buy}</div>
        <div class="feats">
          <div class="ft"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>Authentic K-Beauty from HQ</div>
          <div class="ft"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-11V5l-8-3-8 3v6c0 7 8 11 8 11z"/></svg>Safe ingredients · quality controlled</div>
          <div class="ft"><svg viewBox="0 0 24 24"><path d="M3 7h13v10H3zM16 10h4l1 3v4h-5"/><circle cx="7" cy="19" r="1.5"/><circle cx="18" cy="19" r="1.5"/></svg>Extra discount & free shipping with subscription</div>
        </div>
      </div>
    </div>
    ${guarantee}${benefits}${conceptBand}${how}${subsave}${infoTable}`;

  // sticky mobile buy bar
  const bar=document.createElement('div');
  bar.className='pd-stickybar';
  const sbPrice = t?UNICORE.peso(t.sub):UNICORE.peso(p.php);
  bar.innerHTML=`<div class="sb-l"><div class="sb-n">${p.name}</div><div class="sb-p">${sbPrice}</div></div><button class="btn btn-green" onclick="pdAdd(${p.id})">Add to cart</button>`;
  document.body.appendChild(bar);
  const anchor=document.querySelector('.pbtns');
  if(anchor && 'IntersectionObserver' in window){
    new IntersectionObserver(([e])=>{bar.classList.toggle('show', !e.isIntersecting);},{rootMargin:'0px 0px -40px 0px'}).observe(anchor);
  }
}

function pdQty(delta){const el=document.getElementById('pdQtyIn');if(!el)return;let v=parseInt(el.value||'1',10)+delta;if(isNaN(v)||v<1)v=1;if(v>99)v=99;el.value=v;}
function pdAdd(pid){const el=document.getElementById('pdQtyIn');let q=el?parseInt(el.value||'1',10):1;if(isNaN(q)||q<1)q=1;
  const c=UNICORE.getCart();c[pid]=(c[pid]||0)+q;UNICORE.setCart(c);UNICORE.toast(q+(q>1?' items':' item')+' added to cart');}

const rel = UNICORE.PRODUCTS.filter(x=>p&&x.cat===p.cat&&x.id!=id).slice(0,4);
const host=document.getElementById('related');
host.innerHTML = rel.map(x=>{
  const pb = `<div class="p">${UNICORE.peso(x.php)} <small>${x.live?'Shopee':'Member'}</small></div>`;
  const bd = x.live?`<span class="badge">On Shopee</span>`:`<span class="badge soon">New</span>`;
  return `<a class="prod" href="product-detail.html?id=${x.id}"><div class="img">${bd}<span class="ph">${x.name.slice(0,16)}</span>
    <img src="${UNICORE.PIMG}${x.img}" alt="${x.name}" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'"></div>
    <div class="body"><div class="cat">${x.cat}</div><div class="nm">${x.name}</div>${pb}</div></a>`;
}).join('');
</script>
</body>
</html>
