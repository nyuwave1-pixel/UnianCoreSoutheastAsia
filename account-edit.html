<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="robots" content="noindex" />
<title>Edit profile — UNI&CORE</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='3' y='4' width='4' height='16' fill='%23A7A8A8'/%3E%3Crect x='10' y='4' width='4' height='16' fill='%235C9A46'/%3E%3Crect x='17' y='4' width='4' height='16' fill='%233A3A3A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="account">
<a class="skip" href="#main">Skip to content</a>
<div id="site-header"></div>

<main id="main">
<section class="page-hero">
  <div class="bg" style="background-image:url('https://superhero.co.kr/unincore/images/main/main_02.jpg')"></div>
  <div class="wrap"><div class="crumb"><a href="index.html">HOME</a> › <a href="account.html">MY ACCOUNT</a> › EDIT</div><div class="brandline">United power of uni&amp;core to the global</div><h1>Edit profile</h1><p>Update your details and password.</p></div>
</section>

<section class="section"><div class="wrap">
  <div class="auth-wrap reveal">
    <div class="auth-card">
      <div class="auth-msg" id="pMsg"></div>
      <form id="profileForm">
        <h2>Your details</h2>
        <div class="sub">Keep your account information up to date.</div>
        <div class="field"><label for="eName">Name</label><input id="eName" type="text" autocomplete="name" required></div>
        <div class="field"><label for="eCountry">Country</label>
          <select id="eCountry">
            <option value="PH">Philippines</option>
            <option value="TH">Thailand</option>
            <option value="ID">Indonesia</option>
            <option value="VN">Vietnam</option>
            <option value="MY">Malaysia</option>
          </select>
        </div>
        <div class="field"><label for="ePhone">Phone <span style="color:var(--muted);font-weight:700">(optional)</span></label><input id="ePhone" type="tel" autocomplete="tel" placeholder="e.g. +63 9XX XXX XXXX"></div>
        <div class="field"><label>Email</label><input id="eEmail" type="email" disabled style="background:var(--paper);color:var(--muted)"></div>
        <button class="btn btn-green" type="submit" style="width:100%;margin-top:6px">Save changes</button>
      </form>
    </div>

    <div class="auth-card" style="margin-top:18px">
      <div class="auth-msg" id="wMsg"></div>
      <form id="pwForm">
        <h2>Change password</h2>
        <div class="sub">Use at least 8 characters.</div>
        <div class="field"><label for="curPw">Current password</label><input id="curPw" type="password" autocomplete="current-password" required></div>
        <div class="field"><label for="newPw">New password</label><input id="newPw" type="password" autocomplete="new-password" placeholder="At least 8 characters" required></div>
        <div class="field"><label for="newPw2">Confirm new password</label><input id="newPw2" type="password" autocomplete="new-password" required></div>
        <button class="btn btn-dark" type="submit" style="width:100%;margin-top:6px">Update password</button>
      </form>
    </div>

    <p class="auth-note" id="editNote"></p>
    <div style="text-align:center;margin-top:18px"><a class="btn btn-outline" href="account.html">← Back to my account</a></div>
  </div>
</div></section>
</main>

<div id="site-footer"></div>
<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
<script>
(function(){
  function start(){
    if(!window.UNICORE){setTimeout(start,60);return;}
    const u=UNICORE.currentUser&&UNICORE.currentUser();
    if(!u){location.replace('login.html');return;}
    document.getElementById('eName').value=u.name||'';
    document.getElementById('eEmail').value=u.email||'';
    document.getElementById('ePhone').value=u.phone||'';
    if(u.country){const sel=document.getElementById('eCountry');if([...sel.options].some(o=>o.value===u.country))sel.value=u.country;}
    if(UNICORE.authMode&&UNICORE.authMode()==='demo')
      document.getElementById('editNote').textContent='Demo mode: changes are saved on this device. Connect the admin backend for server-side accounts.';

    function msg(el,t,k){const m=document.getElementById(el);m.textContent=t;m.className='auth-msg '+k;}

    document.getElementById('profileForm').addEventListener('submit',async function(e){
      e.preventDefault();msg('pMsg','Saving…','ok');
      const r=await UNICORE.updateProfile({fullName:document.getElementById('eName').value.trim(),country:document.getElementById('eCountry').value,phone:document.getElementById('ePhone').value.trim()});
      msg('pMsg', r.ok?'Profile updated.':(r.err||'Could not save.'), r.ok?'ok':'err');
    });

    document.getElementById('pwForm').addEventListener('submit',async function(e){
      e.preventDefault();
      const cur=document.getElementById('curPw').value, n1=document.getElementById('newPw').value, n2=document.getElementById('newPw2').value;
      if(n1!==n2){msg('wMsg','New passwords do not match.','err');return;}
      msg('wMsg','Updating…','ok');
      const r=await UNICORE.changePassword(cur,n1);
      if(r.ok){msg('wMsg','Password updated.','ok');this.reset();}
      else msg('wMsg',r.err||'Could not change password.','err');
    });
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start);else start();
})();
</script>
</body>
</html>
