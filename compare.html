<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="robots" content="noindex" />
<title>Compare Products — UNI&CORE</title>
<meta property="og:type" content="website" />
<meta property="og:site_name" content="UNI&CORE" />
<meta property="og:title" content="Compare Products — UNI&CORE" />
<meta property="og:description" content="Compare UNI&CORE products side by side — price, key ingredients and specs." />
<meta property="og:image" content="https://superhero.co.kr/unincore/images/main/main_02.jpg" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='3' y='4' width='4' height='16' fill='%23A7A8A8'/%3E%3Crect x='10' y='4' width='4' height='16' fill='%235C9A46'/%3E%3Crect x='17' y='4' width='4' height='16' fill='%233A3A3A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="products">
<a class="skip" href="#main">Skip to content</a>
<div id="site-header"></div>

<main id="main">
<section class="page-hero">
  <div class="bg" style="background-image:url('https://superhero.co.kr/unincore/images/main/main_02.jpg')"></div>
  <div class="wrap"><div class="crumb"><a href="index.html">HOME</a> › COMPARE</div><div class="brandline">United power of uni&amp;core to the global</div><h1>Compare Products</h1><p>See your selected products side by side — price, key ingredients and specs.</p></div>
</section>

<section class="section"><div class="wrap">
  <div id="cmpRoot"></div>
</div></section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
function esc(s){return String(s==null?'':s);}
function render(){
  const ids=UNICORE.getCompare();
  const items=ids.map(id=>UNICORE.get(id)).filter(Boolean);
  const root=document.getElementById('cmpRoot');
  if(items.length<2){
    root.innerHTML=`<div class="cmp-empty"><svg viewBox="0 0 24 24"><path d="M7 16V4m0 0L4 7m3-3l3 3M17 8v12m0 0l3-3m-3 3l-3-3"/></svg>
      <h3>Select at least 2 products to compare</h3><p style="margin-bottom:20px">Tap “Compare” on any product card, then come back here.</p>
      <a class="btn btn-green" href="products.html">Browse products →</a></div>`;
    return;
  }
  const col=p=>{
    const t=UNICORE.tiers(p.id); const d=UNICORE.detail(p.id)||{}; const info=d.info||{};
    const key=info['Key ingredient']||info['Key benefit']||'—';
    const buy = p.live
      ? `<span class="cmp-buy" onclick="window.open(UNICORE.shopeeUrl(${p.id}),'_blank','noopener')">Buy on Shopee ↗</span>`
      : `<span class="cmp-buy" onclick="UNICORE.addToCart(${p.id})">Add to cart</span>`;
    return {
      head:`<a href="product-detail.html?id=${p.id}"><img class="cmp-prod-img" src="${UNICORE.PIMG}${p.img}" alt="${esc(p.name)}" onerror="this.style.opacity=.2"><span class="cmp-nm">${esc(p.name)}</span></a><button class="cmp-rm" onclick="UNICORE.toggleCompare(${p.id});render();">Remove</button>`,
      cat:esc(p.cat),
      retail:t?`<span class="pp">${UNICORE.peso(t.retail)}</span>`:'—',
      member:t?`<span class="pp">${UNICORE.peso(t.member)}</span>`:UNICORE.peso(p.php),
      sub:t?`<span class="pp sub">${UNICORE.peso(t.sub)}</span>`:'—',
      key:esc(key),
      best:esc(info['Best for']||'—'),
      code:esc(info['Product code']||'—'),
      buy
    };
  };
  const cols=items.map(col);
  const row=(label,get)=>`<tr><th class="rowlabel">${label}</th>${cols.map(c=>`<td>${get(c)}</td>`).join('')}</tr>`;
  root.innerHTML=`<div class="shead reveal" style="text-align:left;margin-bottom:24px"><div class="k">Side by side</div><h2>Comparing ${items.length} products</h2><p>Prices in Philippine Peso (₱)</p></div>
    <div class="cmp-table-wrap"><table class="cmp-table"><tbody>
      ${row('Product',c=>c.head)}
      ${row('Category',c=>c.cat)}
      ${row('Retail price',c=>c.retail)}
      ${row('Membership',c=>c.member)}
      ${row('Subscription',c=>c.sub)}
      ${row('Key ingredient',c=>c.key)}
      ${row('Best for',c=>c.best)}
      ${row('Product code',c=>c.code)}
      ${row('Buy',c=>c.buy)}
    </tbody></table></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:28px">
      <a class="btn btn-outline" href="products.html">Add more products</a>
      <button class="btn btn-dark" onclick="UNICORE.clearCompare();render();">Clear comparison</button>
    </div>`;
}
render();
</script>
</body>
</html>
