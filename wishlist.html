<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FFFFFF" />
<meta name="robots" content="noindex" />
<title>Wishlist — UNI&CORE</title>
<meta property="og:type" content="website" />
<meta property="og:site_name" content="UNI&CORE" />
<meta property="og:title" content="My Wishlist — UNI&CORE" />
<meta property="og:description" content="Your saved UNI&CORE products — authentic HQ K-beauty & healthcare." />
<meta property="og:image" content="https://superhero.co.kr/unincore/images/main/main_02.jpg" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect x='3' y='4' width='4' height='16' fill='%23A7A8A8'/%3E%3Crect x='10' y='4' width='4' height='16' fill='%235C9A46'/%3E%3Crect x='17' y='4' width='4' height='16' fill='%233A3A3A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="products">
<a class="skip" href="#main">Skip to content</a>
<div id="site-header"></div>

<main id="main">
<section class="page-hero">
  <div class="bg" style="background-image:url('https://superhero.co.kr/unincore/images/main/main_02.jpg')"></div>
  <div class="wrap"><div class="crumb"><a href="index.html">HOME</a> › WISHLIST</div><div class="brandline">United power of uni&amp;core to the global</div><h1>My Wishlist</h1><p>Your saved products — add them to cart or buy on Shopee anytime.</p></div>
</section>

<section class="section"><div class="wrap">
  <div id="wishHead" class="shead reveal" style="display:none"><div class="k">Saved items</div><h2>Your Wishlist</h2><p><span id="wishN">0</span> saved · they're kept on this device</p></div>
  <div class="pgrid" id="wishRoot"></div>
</div></section>
</main>

<div id="site-footer"></div>
<script src="assets/app.js"></script>
<script>
function render(){
  const ids=UNICORE.getWishlist();
  const root=document.getElementById('wishRoot');
  const head=document.getElementById('wishHead');
  const items=ids.map(id=>UNICORE.get(id)).filter(Boolean);
  if(!items.length){
    head.style.display='none';
    root.className='';
    root.innerHTML=`<div class="wempty"><svg viewBox="0 0 24 24"><path d="M19 14c1.5-1.5 3-3.3 3-5.5A3.5 3.5 0 0 0 12 6 3.5 3.5 0 0 0 2 8.5c0 2.2 1.5 4 3 5.5l7 7z"/></svg>
      <h3>Your wishlist is empty</h3><p style="margin-bottom:20px">Tap the ♥ on any product to save it here.</p>
      <a class="btn btn-green" href="products.html">Browse products →</a></div>`;
    return;
  }
  head.style.display='';
  document.getElementById('wishN').textContent=items.length;
  root.className='pgrid';
  root.innerHTML=items.map(p=>{
    const buy = p.live
      ? `<span class="buy-shopee" onclick="event.preventDefault();event.stopPropagation();window.open(UNICORE.shopeeUrl(${p.id}),'_blank','noopener')">Buy on Shopee ↗</span>`
      : `<button class="addcart" onclick="event.preventDefault();UNICORE.addToCart(${p.id})">Add to cart</button>`;
    const badge = p.live ? `<span class="badge shopee">On Shopee</span>` : `<span class="badge soon">New</span>`;
    return `<a class="prod in" href="product-detail.html?id=${p.id}">
      <div class="img">${badge}
        <button class="wish-btn on" onclick="event.preventDefault();event.stopPropagation();UNICORE.toggleWishlist(${p.id});render();" aria-label="Remove from wishlist"><svg viewBox="0 0 24 24"><path d="M19 14c1.5-1.5 3-3.3 3-5.5A3.5 3.5 0 0 0 12 6 3.5 3.5 0 0 0 2 8.5c0 2.2 1.5 4 3 5.5l7 7z"/></svg></button>
        <span class="ph">${p.name.slice(0,16)}</span>
        <img src="${UNICORE.PIMG}${p.img}" alt="${p.name}" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'"></div>
      <div class="body"><div class="cat">${p.cat}</div><div class="nm">${p.name}</div>
        <div class="p">${UNICORE.peso(p.php)} <small>${p.live?'Shopee':'Member'}</small></div>${buy}</div>
    </a>`;}).join('');
}
render();
</script>
</body>
</html>
